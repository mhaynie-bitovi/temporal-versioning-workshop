apiVersion: temporal.io/v1alpha1
kind: TemporalWorkerDeployment
metadata:
  name: valet-worker
  namespace: default
spec:
  workerOptions:
    connectionRef:
      name: cluster-default
    temporalNamespace: default
  # Initial rollout strategy (Part A)
  rollout:
    strategy: AllAtOnce
  # TODO (Part B): Switch to the Progressive rollout strategy
  # rollout:
  #   strategy: Progressive
  #   steps:
  #     - rampPercentage: 25
  #       pauseDuration: 30s
  #     - rampPercentage: 75
  #       pauseDuration: 30s
  # TODO (Part C): Add a gate to the Progressive strategy.
  # rollout:
  #  strategy: Progressive
  #  steps:
  #    - rampPercentage: 25
  #      pauseDuration: 30s
  #    - rampPercentage: 75
  #      pauseDuration: 30s
  #  gate:
  #    workflowType: "ValetGateWorkflow"
  # TODO (Part D): Switch to the Manual rollout strategy
  # rollout:
  #   strategy: Manual
  sunset:
    scaledownDelay: 30s
    deleteDelay: 2m
  replicas: 1
  template:
    spec:
      containers:
        - name: valet-worker
          # TODO (Part B): Switch to the 2.0 image
          # TODO (Part C): Switch to the 3.0 image (and then, later, the 3.1 image)
          # TODO (Part D): Switch to the 4.0 image
          image: valet-worker:1.0
          imagePullPolicy: IfNotPresent
